# ===== RH grupo Lisbonb - nginx (frontend + proxy do backend) =====
server {
    listen 80;
    server_name _;

    # Tamanho máximo de upload de documentos (ajuste se precisar de ficheiros maiores)
    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # API -> backend FastAPI (mesmo domínio, sem CORS)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Ficheiros estáticos com cache longo
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota desconhecida devolve o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
